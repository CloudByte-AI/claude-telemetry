# Strict security profile — maximum protection. Every detector on.
# All PII types, entropy, keyword assignments.
#
# Includes detectors intentionally excluded from standard due to noise:
#   Keyword Secret — catches "api_key = value" style assignments
#   Bearer Token   — catches all Authorization: Bearer headers
#   Basic Auth     — catches http://user:pass@host URLs
#   Entropy Secret — entropy-based catch-all for high-randomness values
#   Email Address  — PII: all email addresses
#   Phone Number   — PII: all phone numbers
plan: strict
enabled: true
scope: prompt_only

categories:
  # ── Cloud & Infrastructure ───────────────────────────────────────────────
  AWS: true
  GCP: true
  DigitalOcean: true
  Cloudflare: true

  # ── AI & ML Platforms ────────────────────────────────────────────────────
  OpenAI: true
  Anthropic: true
  Groq: true
  HuggingFace: true
  Replicate: true
  Cohere: true
  Mistral: true

  # ── Developer Tools ──────────────────────────────────────────────────────
  GitHub: true
  GitLab: true
  NPM: true
  PyPI: true

  # ── Payment Gateways ─────────────────────────────────────────────────────
  Stripe: true
  Razorpay: true

  # ── Communication ────────────────────────────────────────────────────────
  Twilio: true

  # ── Database Credentials ─────────────────────────────────────────────────
  Database Connection: true
  JDBC Connection: true

  # ── Auth / Credentials ───────────────────────────────────────────────────
  JWT: true
  Private Key: true
  Bearer Token: true
  Basic Auth: true

  # ── PII ──────────────────────────────────────────────────────────────────
  Email Address: true
  Phone Number: true

  # ── Generic / Entropy ────────────────────────────────────────────────────
  Entropy Secret: true
  Keyword Secret: true

custom_patterns: []
keyword_blocklist: []

# ── Per-scan-point: prompts get max strictness; responses relax some checks ──
prompt:
  categories:
    Email Address: true
    Phone Number: true
    Entropy Secret: true

response:
  categories:
    Phone Number: false       # phone numbers appear legitimately in Claude responses
    Entropy Secret: false     # Claude outputs often contain hash-like strings
    Keyword Secret: false     # Claude generates assignment examples in answers
