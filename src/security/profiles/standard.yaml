# Standard security profile - recommended for most developers.
# Philosophy: high-confidence detections only. Avoids patterns that
# produce excessive noise in normal developer code.
#
# The categories: section maps each detector's CATEGORY to true/false.
# Missing categories fall back to the detector's ENABLED_BY_DEFAULT value.
#
# Off by default (moved to strict or opt-in only):
#   Bearer Token   - catches every test/mock Authorization header
#   Basic Auth     - HTTP URLs with auth common in docs and examples
#   Keyword Secret - variable-assignment catch-all - too noisy in dev code
#   Entropy Secret - entropy scan (enabled by default)
#   Email Address  - appears legitimately in many contexts
#   Phone Number   - digit sequences common in many non-PII contexts
plan: standard
enabled: true
scope: prompt_only

categories:
  # ── Cloud & Infrastructure ───────────────────────────────────────────────
  AWS: true
  GCP: true
  DigitalOcean: true
  Cloudflare: true

  # ── AI & ML Platforms ────────────────────────────────────────────────────
  OpenAI: true
  Anthropic: true
  Groq: true
  HuggingFace: true
  Replicate: true
  Cohere: true
  Mistral: true

  # ── Developer Tools ──────────────────────────────────────────────────────
  GitHub: true
  GitLab: true
  NPM: true
  PyPI: true

  # ── Payment Gateways ─────────────────────────────────────────────────────
  Stripe: true
  Razorpay: true

  # ── Communication ────────────────────────────────────────────────────────
  Twilio: true

  # ── Database Credentials ─────────────────────────────────────────────────
  Database Connection: true
  JDBC Connection: true

  # ── Auth / Credentials ───────────────────────────────────────────────────
  JWT: true
  Private Key: true
  Bearer Token: false           # noisy - every mock auth header fires
  Basic Auth: false             # noisy - common in docs / examples

  # ── PII (off by default - enable in strict or user config) ───────────────
  Email Address: false
  Phone Number: false

  # ── Generic / Entropy ────────────────────────────────────────────────────
  Entropy Secret: true
  Keyword Secret: false

custom_patterns: []
keyword_blocklist: []

# ── Allowlist ─────────────────────────────────────────────────────────────────
# Exact values that should NEVER be detected, flagged, or block a prompt.
# Use this for documentation examples, test fixtures, or placeholder values
# that look like real credentials but are intentionally safe.
#
# To add a value: paste the exact string below (including prefix if any).
# The scanner performs a direct O(1) lookup - no regex involved.
#
# Example:
#   allowlist:
#     - "AKIAIOSFODNN7EXAMPLE"      # AWS docs example
#     - "sk-proj-TESTKEY000000000"  # placeholder in your README
#     - "ghp_xxxxxxxxxxxxxxxxxxxx"  # fake token in onboarding guide
#
allowlist: []

# ── Optional per-scan-point overrides ────────────────────────────────────────
# Uncomment to apply different settings per scan point.

# prompt:
#   categories:
#     Email Address: true     # stricter PII checks on prompts only

# response:
#   categories:
#     JWT: false              # skip JWT in Claude's own responses to reduce noise
