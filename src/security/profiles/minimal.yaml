# Minimal security profile - basic cloud key + critical token protection only.
# No PII scanning. Prompts only. Catches the most critical credentials.
plan: minimal
enabled: true
scope: prompt_only

categories:
  # ── Cloud & Infrastructure ───────────────────────────────────────────────
  AWS: true
  GCP: true
  DigitalOcean: false
  Cloudflare: false

  # ── AI & ML Platforms ────────────────────────────────────────────────────
  OpenAI: true
  Anthropic: true
  Groq: false
  HuggingFace: false
  Replicate: false
  Cohere: false
  Mistral: false

  # ── Developer Tools ──────────────────────────────────────────────────────
  GitHub: true
  GitLab: true
  NPM: false
  PyPI: false

  # ── Payment Gateways ─────────────────────────────────────────────────────
  Stripe: true
  Razorpay: true

  # ── Communication ────────────────────────────────────────────────────────
  Twilio: false

  # ── Database Credentials ─────────────────────────────────────────────────
  Database Connection: false
  JDBC Connection: false

  # ── Auth / Credentials ───────────────────────────────────────────────────
  JWT: true
  Private Key: true
  Bearer Token: false
  Basic Auth: false

  # ── PII ──────────────────────────────────────────────────────────────────
  Email Address: false
  Phone Number: false

  # ── Generic / Entropy ────────────────────────────────────────────────────
  Entropy Secret: true
  Keyword Secret: false

custom_patterns: []
keyword_blocklist: []
